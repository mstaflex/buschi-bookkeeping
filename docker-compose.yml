services:

  # ---------------------------------------------------------------------------
  # Bootstrap: Writes secret files on first run into a named volume.
  # Env vars are optional – sane defaults and generated passwords are used
  # if nothing is provided. Credentials are printed once to docker logs.
  # On subsequent deploys the volume already contains real credentials and
  # bootstrap skips all files automatically.
  # ---------------------------------------------------------------------------
  bootstrap:
    build: ./bootstrap
    restart: "no"
    volumes:
      - secrets_data:/secrets
    environment:
      DB_NAME:            ${DB_NAME:-}
      DB_ADMIN_USER:      ${DB_ADMIN_USER:-}
      DB_ADMIN_PASSWORD:  ${DB_ADMIN_PASSWORD:-}
      DB_WORKER_USER:     ${DB_WORKER_USER:-}
      DB_WORKER_PASSWORD: ${DB_WORKER_PASSWORD:-}

  # ---------------------------------------------------------------------------
  # PostgreSQL – starts only after bootstrap has completed successfully.
  # Secrets are read from the shared named volume, not from host files,
  # so no placeholder files need to exist in the repository.
  # ---------------------------------------------------------------------------
  postgres:
    build: ./postgres
    restart: unless-stopped
    container_name: orderdb
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB_FILE:       /run/secrets/db_name.txt
      POSTGRES_USER_FILE:     /run/secrets/db_admin_user.txt
      POSTGRES_PASSWORD_FILE: /run/secrets/db_admin_password.txt
    volumes:
      - secrets_data:/run/secrets:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_admin_user.txt) -d $(cat /run/secrets/db_name.txt)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - n8n-backend

  # ---------------------------------------------------------------------------
  # Typst PDF API – erzeugt Rechnungen, Lieferscheine, Versandetiketten.
  # Erreichbar für n8n intern unter: http://typst-api:8080
  # ---------------------------------------------------------------------------
  typst-api:
    build: ./typst-api
    restart: unless-stopped
    container_name: typst-api
    networks:
      - n8n-backend
    # Nur für lokale Entwicklung / Tests von außen:
    # ports:
    #   - "8080:8080"

networks:
  n8n-backend:
    external: true

volumes:
  secrets_data:
  postgres_data:
